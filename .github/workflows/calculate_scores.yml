name: Hourly Sweepstake Score Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set Up Python Runtime Engine
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Score Matrix Calculations
      env:
        FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      run: python src/api_client.py

    - name: Deploy Updated Leaderboard to GitHub Pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/users.json
        git diff-index --quiet HEAD || (git commit -m "chore: automated hourly leaderboard calculation updates" && git push)