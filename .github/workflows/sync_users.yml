name: Sync Google Form Entries

on:
  repository_dispatch:
    types: [form_submission]

jobs:
  update-users:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Save raw form submissions
        run: |
          mkdir -p data
          echo '${{ github.event.client_payload.users_data }}' > data/raw_submissions.json

      - name: Commit raw submission data
        run: |
          git config --global user.name 'Sweepstake Data Engine'
          git config --global user.email 'engine@github.com'
          git add data/raw_submissions.json
          git commit -m "Automated Sync: New sweepstake player registered" || echo "No changes to sync"
          git push