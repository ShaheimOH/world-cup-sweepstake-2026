<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Sweepstake</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gradient-to-r from-blue-700 via-purple-700 to-red-600 py-10 text-center shadow-xl">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-white drop-shadow-md">
            WORLD CUP 2026
        </h1>
        <p class="text-xl md:text-2xl mt-2 font-medium text-gray-200">
            🏆 Sweepstake Tracker 🏆
        </p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md text-center">
                <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Total Teams</p>
                <p class="text-4xl font-bold text-blue-400 mt-1">48</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md text-center">
                <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Groups</p>
                <p class="text-4xl font-bold text-purple-400 mt-1">12</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md text-center">
                <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Players Registered</p>
                <p id="player-count" class="text-4xl font-bold text-emerald-400 mt-1">0</p>
            </div>
        </section>

        <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-2 flex items-center gap-2">
            📊 Group Stage Brackets
        </h2>
        
        <div id="groups-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="text-center py-10 col-span-full">
                <p class="text-gray-400 animate-pulse">Loading tournament metrics...</p>
            </div>
        </div>
    </main>

    <script>
        async function initDashboard() {
            try {
                // Fetch our structural setup data asynchronously
                const [teamsRes, usersRes] = await Promise.all([
                    fetch('./data/teams.json'),
                    fetch('./data/users.json')
                ]);

                const teamsData = await teamsRes.json();
                const usersData = await usersRes.json();

                // Map assigned users to their drafted teams for O(1) rendering checks
                const teamToUserMap = {};
                usersData.forEach(entry => {
                    teamToUserMap[entry.team] = entry.name;
                });

                // Update structural player counts
                document.getElementById('player-count').textContent = usersData.length;

                const groupsGrid = document.getElementById('groups-grid');
                groupsGrid.innerHTML = ''; // Wipe loading placeholder

                // Iterate through the 12 groups (A through L)
                Object.keys(teamsData).forEach(groupName => {
                    const groupContainer = document.createElement('div');
                    groupContainer.className = 'bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden transition transform hover:-translate-y-1 hover:shadow-2xl duration-200';

                    // Group Header Banner
                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'bg-gray-700 px-5 py-3 border-b border-gray-600 font-bold text-lg text-gray-200 tracking-wide';
                    groupHeader.textContent = groupName;
                    groupContainer.appendChild(groupHeader);

                    // Team Roster Rows Table
                    const teamList = document.createElement('ul');
                    teamList.className = 'divide-y divide-gray-700';

                    teamsData[groupName].forEach(team => {
                        const assignedUser = teamToUserMap[team] || '⚠️ Unassigned';
                        const isAssigned = teamToUserMap[team];

                        const item = document.createElement('li');
                        item.className = 'px-5 py-4 flex items-center justify-between text-sm hover:bg-gray-750 transition';
                        
                        item.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="font-semibold text-gray-100">${team}</span>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${
                                isAssigned 
                                ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' 
                                : 'bg-gray-900 text-gray-500 border border-gray-800'
                            }">
                                ${assignedUser}
                            </span>
                        `;
                        teamList.appendChild(item);
                    });

                    groupContainer.appendChild(teamList);
                    groupsGrid.appendChild(groupContainer);
                });

            } catch (error) {
                console.error("Dashboard engine rendering failure:", error);
                document.getElementById('groups-grid').innerHTML = `
                    <div class="text-center py-10 col-span-full text-red-400 font-medium">
                        ❌ Failed to process data feeds. Ensure local JSON configurations are valid.
                    </div>
                `;
            }
        }

        // Initialize display execution on document load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
