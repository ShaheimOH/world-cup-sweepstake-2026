<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Prediction Sweepstake</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

    <header class="bg-gradient-to-r from-indigo-900 via-purple-900 to-rose-900 py-12 text-center shadow-2xl border-b border-purple-800/30">
        <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white drop-shadow-lg">
            WORLD CUP 2026
        </h1>
        <p class="text-xl md:text-2xl mt-2 font-bold text-amber-400 tracking-wide uppercase">
            🔮 Prediction Sweepstake 🔮
        </p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <section class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-12">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 text-center shadow-lg">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Matches</p>
                <p class="text-4xl font-extrabold text-indigo-400 mt-1">104</p>
            </div>
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 text-center shadow-lg">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Pundits Submitted</p>
                <p id="player-count" class="text-4xl font-extrabold text-amber-400 mt-1">0</p>
            </div>
        </section>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-800 bg-gray-900/50 flex justify-between items-center">
                <h2 class="text-xl font-black text-gray-100 flex items-center gap-2">
                    📋 Leaderboard & Predictions
                </h2>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-950 text-gray-400 uppercase text-xs font-black tracking-wider border-b border-gray-800">
                            <th class="px-6 py-4">Player</th>
                            <th class="px-6 py-4 text-amber-400">⭐ Total Points</th>
                            <th class="px-6 py-4 text-emerald-400">🏆 Winners</th>
                            <th class="px-6 py-4 text-blue-400">🥈 Runners-Up</th>
                            <th class="px-6 py-4 text-rose-400">📉 Disappointment</th>
                            <th class="px-6 py-4 text-amber-400">🚀 Underdogs</th>
                        </tr>
                    </thead>
                    <tbody id="predictions-tbody" class="divide-y divide-gray-800/60">
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-500 animate-pulse font-medium">
                                Waiting for submissions from the tactical board...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchPredictions() {
            try {
                // Fetch the dynamic user list generated by Google Sheets
                const response = await fetch('./data/users.json');
                const usersData = await response.json();
                
                document.getElementById('player-count').textContent = usersData.length;
                const tbody = document.getElementById('predictions-tbody');
                
                if(usersData.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-500 font-medium">
                                No submissions yet. Share your Google Form link to start the sweepstake!
                            </td>
                        </tr>`;
                    return;
                }

                tbody.innerHTML = ''; // Wipe loading row

                usersData.forEach(player => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-850/40 transition duration-150";
                    row.innerHTML = `
                        <td class="px-6 py-4 font-black text-gray-200">${player.name}</td>
                        <td class="px-6 py-4 font-extrabold text-xl text-amber-400">${player.totalScore || 0} pts</td>
                        <td class="px-6 py-4"><span class="bg-emerald-950/80 text-emerald-400 border border-emerald-900/50 px-3 py-1.5 rounded-xl text-sm font-semibold">${player.winners}</span></td>
                        <td class="px-6 py-4"><span class="bg-blue-950/80 text-blue-400 border border-blue-900/50 px-3 py-1.5 rounded-xl text-sm font-semibold">${player.runnersUp}</span></td>
                        <td class="px-6 py-4"><span class="bg-rose-950/80 text-rose-400 border border-rose-900/50 px-3 py-1.5 rounded-xl text-sm font-semibold">${player.disappointment}</span></td>
                        <td class="px-6 py-4"><span class="bg-amber-950/80 text-amber-400 border border-amber-900/50 px-3 py-1.5 rounded-xl text-sm font-semibold">${player.underdogs}</span></td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error("Failed to load dashboard metrics:", error);
            }
        }
        document.addEventListener('DOMContentLoaded', fetchPredictions);
    </script>
</body>
</html>
